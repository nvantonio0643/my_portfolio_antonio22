<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midterm Task 7 - Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: #F7CAC9;
            color: #333;
            line-height: 1.6;
        }

        
        header {
            background: linear-gradient(#ffb7a5, #b76e79, #ffb7a5);
            color: white;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
        }

        
        .doc-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }

        .section-title {
            color: #533638;
            border-bottom: 3px solid #F759C4;
            display: inline-block;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }

        
        .screenshot-box {
            width: 100%;
            background: #f0f0f0;
            border: 2px dashed #F759C4;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-bottom: 25px;
        }

        .screenshot-box img {
            max-width: 100%;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        
        .desc-box {
            background: #fffafa;
            padding: 20px;
            border-left: 6px solid #F759C4;
            font-style: italic;
            margin-bottom: 30px;
        }

        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .feature-item {
            background: #fdfdfd;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 10px;
            text-align: center;
            transition: transform 0.3s;
        }

        .feature-item:hover {
            transform: translateY(-5px);
            border-color: #F759C4;
        }

        .feature-item h4 {
            color: #533638;
            margin-bottom: 10px;
        }

        .back-nav {
            text-align: center;
            margin-top: 30px;
        }

        .back-btn {
            background: #533638;
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #b76e79;
            box-shadow: 0 4px 12px rgba(247, 89, 196, 0.4);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: b76e79;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Midterm Task 7: Final Website</h1>
    <p>Midterm Lab Project</p>
</header>

<div class="container">
    <div class="doc-card">
        
		<center>
        <h2 class="section-title"> Screenshot</h2>
		<center>
        <div class="screenshot-box">
            <img src="web1.jpg" alt="Final Website Screenshot Preview">
			<img src="web2.jpg" alt="Final Website Screenshot Preview">
            <img src="web3.jpg" alt="Final Website Screenshot Preview">
            <img src="web4.jpg" alt="Final Website Screenshot Preview">
            <img src="web5.jpg" alt="Final Website Screenshot Preview">

            <p style="font-size: 0.8rem; color: #888; margin-top: 10px;"></p>
        </div>



        <div class="back-nav">
            <a href="index.html" class="back-btn">← Return to Portfolio</a>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 Nerissa Vien M. Antonio | WS101</p>
</footer>

</body>
</html>
